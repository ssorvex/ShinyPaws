backend:
  name: git-gateway
  branch: main

# Uploaded images are stored in the repo under /images/gallery/
media_folder: "images/gallery"
public_folder: "/images/gallery"

collections:
  - name: "gallery"
    label: "Gallery"
    files:
      - label: "Gallery Photos"
        name: "gallery"
        file: "data/gallery.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "image"
                widget: "image"
                hint: "Upload a JPG or PNG. Recommended size: 800×800px minimum."
              - label: "Caption"
                name: "caption"
                widget: "string"
                hint: 'e.g. "Biscuit — Full Groom"'
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Dog Grooming"
                  - "Cat Grooming"
                  - "Daycare"
                  - "Before & After"
                  - "Special"
