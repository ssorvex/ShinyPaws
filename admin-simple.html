<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Paws Admin - Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 Shiny Paws Admin</h1>
        <p class="subtitle">Secure Website Editor</p>

        <div id="message" class="message"></div>
        <div id="loading" class="loading"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('content')">✏️ Content</button>
            <button class="tab-btn" onclick="switchTab('pricing')">💰 Pricing</button>
            <button class="tab-btn" onclick="switchTab('images')">🖼️ Images</button>
        </div>

        <!-- CONTENT TAB -->
        <div id="content" class="tab-content active">
            <div class="form-group">
                <label>Hero Title</label>
                <input type="text" id="heroTitle" placeholder="Where Every Pet Gets Their Glow-Up">
            </div>

            <div class="form-group">
                <label>Hero Subtitle</label>
                <textarea id="heroSubtitle" placeholder="Premium grooming and daycare for dogs and cats"></textarea>
            </div>

            <div class="form-group">
                <label>About Title</label>
                <input type="text" id="aboutTitle" placeholder="Family-Owned, Pet-Obsessed, Community-Proud">
            </div>

            <div class="form-group">
                <label>About Description</label>
                <textarea id="aboutDescription" placeholder="Shiny Paws is a family- and minority-owned grooming salon..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="loadContent()">📥 Load Current</button>
                <button class="btn-primary" onclick="updateContent()">🌐 Update Website</button>
            </div>
        </div>

        <!-- PRICING TAB -->
        <div id="pricing" class="tab-content">
            <div class="form-group">
                <label>Service Name</label>
                <input type="text" id="serviceName" placeholder="e.g., Bath & Brush">
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="text" id="servicePrice" placeholder="e.g., $60">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="serviceDescription" placeholder="Service description..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="loadPricing()">📥 Load Current</button>
                <button class="btn-primary" onclick="updatePricing()">🌐 Update Website</button>
            </div>
        </div>

        <!-- IMAGES TAB -->
        <div id="images" class="tab-content">
            <div class="form-group">
                <label>Select Image File</label>
                <input type="file" id="imageFile" accept="image/*">
            </div>

            <div class="form-group">
                <label>Image Type</label>
                <select id="imageType">
                    <option value="hero">Hero Image</option>
                    <option value="gallery">Gallery Image</option>
                    <option value="about">About Section</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="loadImages()">📥 Load Current</button>
                <button class="btn-primary" onclick="updateImage()">🌐 Update Website</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_CONFIG = {
            owner: 'ssorvex',
            repo: 'ShinyPaws',
            branch: 'main'
        };

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type}`;
            setTimeout(() => msg.classList.remove('show'), 4000);
        }

        function showLoading(show = true) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        async function promptForToken() {
            const token = prompt(
                'Enter your GitHub Personal Access Token:\n\n' +
                'Create one at: https://github.com/settings/tokens\n' +
                'Scope: repo (full control of repositories)\n\n' +
                'Token will be used once and not saved.'
            );
            
            if (!token || token.trim() === '') {
                throw new Error('GitHub token is required');
            }
            
            return token.trim();
        }

        async function getFileFromGitHub(filePath, token) {
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${filePath}`;
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3.raw'
                }
            });

            if (!response.ok) {
                if (response.status === 401) {
                    throw new Error('Invalid GitHub token');
                }
                throw new Error(`Failed to fetch file: ${response.statusText}`);
            }

            return await response.text();
        }

        async function getFileSHA(filePath, token) {
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${filePath}`;
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                return null; // File doesn't exist
            }

            const data = await response.json();
            return data.sha;
        }

        async function uploadFileToGitHub(filePath, content, message, token) {
            const sha = await getFileSHA(filePath, token);
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${filePath}`;
            
            const body = {
                message: message,
                content: btoa(content), // Base64 encode
                branch: GITHUB_CONFIG.branch
            };

            if (sha) {
                body.sha = sha;
            }

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(`GitHub API error: ${error.message}`);
            }

            return await response.json();
        }

        async function loadContent() {
            try {
                showLoading(true);
                const token = await promptForToken();
                
                const studioHtml = await getFileFromGitHub('studio.html', token);
                
                // Extract content from HTML (simple parsing)
                const heroTitleMatch = studioHtml.match(/id="hero-title"[^>]*>([^<]+)</);
                const heroSubtitleMatch = studioHtml.match(/id="hero-subtitle"[^>]*>([^<]+)</);
                const aboutTitleMatch = studioHtml.match(/id="about-title"[^>]*>([^<]+)</);
                const aboutDescMatch = studioHtml.match(/id="about-description"[^>]*>([^<]+)</);
                
                if (heroTitleMatch) document.getElementById('heroTitle').value = heroTitleMatch[1];
                if (heroSubtitleMatch) document.getElementById('heroSubtitle').value = heroSubtitleMatch[1];
                if (aboutTitleMatch) document.getElementById('aboutTitle').value = aboutTitleMatch[1];
                if (aboutDescMatch) document.getElementById('aboutDescription').value = aboutDescMatch[1];
                
                showMessage('✅ Content loaded successfully!');
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function updateContent() {
            try {
                showLoading(true);
                const token = await promptForToken();
                
                const heroTitle = document.getElementById('heroTitle').value;
                const heroSubtitle = document.getElementById('heroSubtitle').value;
                const aboutTitle = document.getElementById('aboutTitle').value;
                const aboutDescription = document.getElementById('aboutDescription').value;
                
                let studioHtml = await getFileFromGitHub('studio.html', token);
                
                // Update content in HTML
                studioHtml = studioHtml.replace(
                    /id="hero-title"[^>]*>[^<]+</,
                    `id="hero-title">${heroTitle}<`
                );
                studioHtml = studioHtml.replace(
                    /id="hero-subtitle"[^>]*>[^<]+</,
                    `id="hero-subtitle">${heroSubtitle}<`
                );
                studioHtml = studioHtml.replace(
                    /id="about-title"[^>]*>[^<]+</,
                    `id="about-title">${aboutTitle}<`
                );
                studioHtml = studioHtml.replace(
                    /id="about-description"[^>]*>[^<]+</,
                    `id="about-description">${aboutDescription}<`
                );
                
                await uploadFileToGitHub(
                    'studio.html',
                    studioHtml,
                    'Update content via admin panel',
                    token
                );
                
                showMessage('✅ Website updated! Changes will appear in 1-2 minutes.');
            } catch (error) {
                showMessage(`❌ Error: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function loadPricing() {
            showMessage('📥 Pricing loading feature coming soon', 'success');
        }

        async function updatePricing() {
            showMessage('🌐 Pricing update feature coming soon', 'success');
        }

        async function loadImages() {
            showMessage('📥 Image loading feature coming soon', 'success');
        }

        async function updateImage() {
            showMessage('🌐 Image update feature coming soon', 'success');
        }
    </script>
</body>
</html>
